    .status.shipped { background: #e0e7ff; color: #4338ca; }
    .status.delivered { background: #d1fae5; color: #059669; }

    .action-btn {

    .action-btn.update { background: #d1fae5; color: #059669; }
    .action-btn.return { background: #fee2e2; color: #dc2626; }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 16px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h2 { font-size: 20px; }
    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #6b7280;
    }
    
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .detail-row label { color: #6b7280; }
    .detail-row span { font-weight: 600; }
    
    .status-select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      margin: 15px 0;
      font-size: 14px;
    }
    
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .modal-actions button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: #000; color: white; }
    .btn-success { background: #16a34a; color: white; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    
    .loading {
      text-align: center;
      padding: 50px;
      color: #6b7280;
    }
    
    .product-info {
      background: #f9fafb;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
    }
    .product-info h4 { margin-bottom: 10px; color: #374151; }
  </style>

  <script>
    const BACKEND_URL = 'https://razorpay-magic-backend.onrender.com';
    let allOrders = [];
    
    async function loadOrders() {
      try {
        const status = document.getElementById('statusFilter').value;
        let url = `${BACKEND_URL}/admin/orders`;
        if (status) url += `?status=${status}`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.success) {
          allOrders = data.orders;
          renderOrders(allOrders);
          updateStats(allOrders);
        }
      } catch (error) {
        console.error('Error loading orders:', error);
        document.getElementById('ordersBody').innerHTML = '<tr><td colspan="7" class="loading">Error loading orders</td></tr>';
      }
    }
    
    function renderOrders(orders) {
      const search = document.getElementById('searchInput').value.toLowerCase();
      
      let filtered = orders;
      if (search) {
        filtered = orders.filter(o => 
          o.order_id.toLowerCase().includes(search) ||
          (o.customer_phone && o.customer_phone.includes(search)) ||
          (o.customer_name && o.customer_name.toLowerCase().includes(search))
        );
      }
      
      if (filtered.length === 0) {
        document.getElementById('ordersBody').innerHTML = '<tr><td colspan="7" class="loading">No orders found</td></tr>';
        return;
      }
      
      const html = filtered.map(order => {
        const items = order.order_items || [];
        const productName = items.length > 0 ? items[0].product_name : 'N/A';
        const date = new Date(order.created_at).toLocaleDateString('en-IN', {
          day: 'numeric', month: 'short', year: 'numeric'
        });
        
        return `
          <tr>
            <td><strong>${order.order_id}</strong></td>
            <td>
              <div>${order.customer_name || 'N/A'}</div>
              <div style="color:#6b7280;font-size:12px;">${order.customer_phone}</div>
            </td>
            <td>${productName}</td>
            <td><strong>₹${order.order_amount}</strong></td>
            <td><span class="status ${order.order_status}">${order.order_status.replace('_', ' ')}</span></td>
            <td>${date}</td>
            <td>
              <button class="action-btn view" onclick="viewOrder('${order.order_id}')">View</button>
              <button class="action-btn update" onclick="updateOrderStatus('${order.order_id}')">Update</button>
              ${order.order_status === 'return_requested' ? `<button class="action-btn return" onclick="processReturn('${order.order_id}')">Return</button>` : ''}
            </td>
          </tr>
        `;
      }).join('');
      
      document.getElementById('ordersBody').innerHTML = html;
    }
    
    function updateStats(orders) {
      const totalRevenue = orders.reduce((sum, o) => sum + parseFloat(o.order_amount || 0), 0);
      const totalOrders = orders.length;
      const pendingOrders = orders.filter(o => ['confirmed', 'processing', 'shipped'].includes(o.order_status)).length;
      const returnOrders = orders.filter(o => o.order_status.includes('return')).length;
      
      document.getElementById('totalRevenue').textContent = '₹' + totalRevenue.toLocaleString('en-IN');
      document.getElementById('totalOrders').textContent = totalOrders;
      document.getElementById('pendingOrders').textContent = pendingOrders;
      document.getElementById('returnOrders').textContent = returnOrders;
    }
    
    function viewOrder(orderId) {
      const order = allOrders.find(o => o.order_id === orderId);
      if (!order) return;
      
      const items = order.order_items || [];
      const returns = order.returns || [];
      
      const html = `
        <div class="detail-row">
          <label>Order ID</label>
          <span>${order.order_id}</span>
        </div>
        <div class="detail-row">
          <label>Status</label>
          <span class="status ${order.order_status}">${order.order_status.replace('_', ' ')}</span>
        </div>
        <div class="detail-row">
          <label>Amount</label>
          <span style="color:#16a34a;font-size:20px;">₹${order.order_amount}</span>
        </div>
        <div class="detail-row">
          <label>Payment ID</label>
          <span style="font-size:12px;">${order.razorpay_payment_id || 'N/A'}</span>
        </div>
        
        <div class="product-info">
          <h4>📦 Product Details</h4>
          ${items.map(item => `
            <div class="detail-row">
              <label>Product</label>
              <span>${item.product_name}</span>
            </div>
            <div class="detail-row">
              <label>Quantity</label>
              <span>${item.quantity}</span>
            </div>
            ${item.product_size ? `<div class="detail-row"><label>Size</label><span>${item.product_size}</span></div>` : ''}
            ${item.product_color ? `<div class="detail-row"><label>Color</label><span>${item.product_color}</span></div>` : ''}
          `).join('')}
        </div>
        
        <div class="product-info">
          <h4>👤 Customer Details</h4>
          <div class="detail-row">
            <label>Name</label>
            <span>${order.customer_name || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <label>Phone</label>
            <span>${order.customer_phone}</span>
          </div>
          <div class="detail-row">
            <label>Email</label>
            <span>${order.customer_email || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <label>Address</label>
            <span>${order.customer_address || ''}, ${order.customer_city || ''}, ${order.customer_state || ''} - ${order.customer_pincode || ''}</span>
          </div>
        </div>
        
        ${returns.length > 0 ? `
          <div class="product-info" style="background:#fee2e2;">
            <h4>🔄 Return Request</h4>
            <div class="detail-row">
              <label>Reason</label>
              <span>${returns[0].return_reason}</span>
            </div>
            <div class="detail-row">
              <label>Status</label>
              <span>${returns[0].return_status}</span>
            </div>
          </div>
        ` : ''}
        
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeModal()">Close</button>
        </div>
      `;
      
      document.getElementById('modalBody').innerHTML = html;
      document.getElementById('orderModal').classList.add('active');
    }
    
    function updateOrderStatus(orderId) {
      const order = allOrders.find(o => o.order_id === orderId);
      if (!order) return;
      
      const html = `
        <div class="detail-row">
          <label>Order ID</label>
          <span>${order.order_id}</span>
        </div>
        <div class="detail-row">
          <label>Current Status</label>
          <span class="status ${order.order_status}">${order.order_status.replace('_', ' ')}</span>
        </div>
        
        <label style="display:block;margin-top:20px;font-weight:600;">Update Status:</label>
        <select class="status-select" id="newStatus">
          <option value="confirmed">Confirmed</option>
          <option value="processing">Processing</option>
          <option value="shipped">Shipped</option>
          <option value="out_for_delivery">Out for Delivery</option>
          <option value="delivered">Delivered</option>
        </select>
        
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn-primary" onclick="saveStatus('${orderId}')">Update Status</button>
        </div>
      `;
      
      document.getElementById('modalBody').innerHTML = html;
      document.getElementById('newStatus').value = order.order_status;
      document.getElementById('orderModal').classList.add('active');
    }
    
    async function saveStatus(orderId) {
      const newStatus = document.getElementById('newStatus').value;
      
      try {
        const response = await fetch(`${BACKEND_URL}/admin/update-order`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ order_id: orderId, status: newStatus })
        });
        
        const data = await response.json();
        if (data.success) {
          alert('Order status updated!');
          closeModal();
          loadOrders();
        } else {
          alert('Error: ' + data.error);
        }
      } catch (error) {
        alert('Error updating order');
      }
    }
    
    function processReturn(orderId) {
      const order = allOrders.find(o => o.order_id === orderId);
      if (!order) return;
      
      const returns = order.returns || [];
      const returnInfo = returns[0] || {};
      
      const html = `
        <div class="detail-row">
          <label>Order ID</label>
          <span>${order.order_id}</span>
        </div>
        <div class="detail-row">
          <label>Amount</label>
          <span style="color:#16a34a;">₹${order.order_amount}</span>
        </div>
        <div class="detail-row">
          <label>Return Reason</label>
          <span>${returnInfo.return_reason || 'N/A'}</span>
        </div>
        <div class="detail-row">
          <label>Description</label>
          <span>${returnInfo.return_description || 'N/A'}</span>
        </div>
        
        <div class="modal-actions">
          <button class="btn-danger" onclick="rejectReturn('${orderId}')">Reject Return</button>
          <button class="btn-success" onclick="approveReturn('${orderId}')">Approve & Refund</button>
        </div>
      `;
      
      document.getElementById('modalBody').innerHTML = html;
      document.getElementById('orderModal').classList.add('active');
    }
    
    async function approveReturn(orderId) {
      if (!confirm('Approve return and process refund?')) return;
      
      try {
        // Approve return
        await fetch(`${BACKEND_URL}/admin/process-return`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ order_id: orderId, action: 'approve' })
        });
        
        // Process refund
        await fetch(`${BACKEND_URL}/admin/process-refund`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ order_id: orderId })
        });
        
        alert('Return approved and refund processed!');
        closeModal();
        loadOrders();
      } catch (error) {
        alert('Error processing return');
      }
    }
    
    async function rejectReturn(orderId) {
      if (!confirm('Reject this return request?')) return;
      
      try {
        await fetch(`${BACKEND_URL}/admin/process-return`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ order_id: orderId, action: 'reject' })
        });
        
        alert('Return rejected');
        closeModal();
        loadOrders();
      } catch (error) {
        alert('Error rejecting return');
      }
    }
    
    function closeModal() {
      document.getElementById('orderModal').classList.remove('active');
    }
    
    // Search on enter
    document.getElementById('searchInput').addEventListener('keyup', function(e) {
      if (e.key === 'Enter') loadOrders();
      else renderOrders(allOrders);
    });
    
    // Load orders on page load
    loadOrders();
  </script>
